# Standard HA Alpine base (trusted registry — Supervisor rejects arbitrary
# ones like docker.io/library/python). No ESPHome toolchain is bundled; all
# builds are delegated to the ESPHome Device Builder dashboard. Python/pip/bash
# are added in the Dockerfile.
build_from:
  aarch64: ghcr.io/home-assistant/aarch64-base:latest
  amd64: ghcr.io/home-assistant/amd64-base:latest
