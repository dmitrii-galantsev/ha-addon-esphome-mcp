name: ESPHome MCP Server (glibc fork)
version: 1.4.0
slug: esphome-mcp
description: >-
  MCP (Model Context Protocol) server exposing ESPHome operations as tools
  for Claude Code. Delegates builds/flashes to the ESPHome Device Builder
  dashboard (official ESPHome add-on) so it always uses current ESPHome, and
  keeps direct filesystem access to /config/esphome — no SSH, no bundled
  toolchain.
url: https://github.com/ojkaas/ha-addon-esphome-mcp
arch:
  - aarch64
  - amd64
ports:
  8098/tcp: 8098
ports_description:
  8098/tcp: MCP Streamable HTTP endpoint
map:
  - config:rw
options:
  auth_token: ""
  dashboard_url: "http://127.0.0.1:6052"
  dashboard_token: ""
schema:
  auth_token: str
  dashboard_url: str
  dashboard_token: str
startup: application
boot: auto
init: false
# host_network so the add-on can reach the ESPHome Device Builder dashboard on
# 127.0.0.1:<ingress_port>. The dashboard runs host-network + ingress-only and
# its peer guard trusts ONLY loopback/supervisor, so a bridge-network add-on
# gets 403. This mirrors how HA core's ESPHome integration reaches it.
host_network: true
ingress: false
panel_icon: mdi:chip
